<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-lg">
        
        <div id="home-page" class="page active">
            <header class="p-6">
                <div class="flex items-center gap-3 mb-6 border-b pb-4">
                    <img id="user-img" src="https://via.placeholder.com/150" class="w-12 h-12 rounded-full border">
                    <div>
                        <p class="text-gray-400 text-xs">ยินดีต้อนรับสู่</p>
                        <h1 class="text-xl font-bold text-slate-800">Bouncy Badminton 🏸</h1>
                    </div>
                </div>
                
                <h2 class="font-bold text-gray-400 text-[10px] tracking-widest uppercase mb-4">เลือกวันที่ต้องการลงชื่อ</h2>
                
                <div class="space-y-4">
                    <div onclick="selectDate('วันอังคาร')" class="bg-white border border-gray-100 rounded-[24px] p-5 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-transform">
                        <div>
                            <p class="font-bold text-lg text-slate-800">วันอังคาร</p>
                            <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                        </div>
                        <div class="text-right text-gray-400">➡️</div>
                    </div>

                    <div onclick="selectDate('วันพฤหัสบดี')" class="bg-white border border-gray-100 rounded-[24px] p-5 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-transform">
                        <div>
                            <p class="font-bold text-lg text-slate-800">วันพฤหัสบดี</p>
                            <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                        </div>
                        <div class="text-right text-gray-400">➡️</div>
                    </div>
                </div>
            </header>
        </div>

        <div id="booking-page" class="page">
            <nav class="p-6 flex items-center gap-4">
                <button onclick="goToPage('home')" class="text-2xl">←</button>
                <h1 class="text-xl font-bold">ยืนยันการลงชื่อ</h1>
            </nav>
            <div class="px-6 space-y-6">
                <div class="bg-slate-900 text-white rounded-[30px] p-6 shadow-xl">
                    <h2 id="selected-day-label" class="text-2xl font-bold mb-1">-</h2>
                    <p class="text-slate-400 text-sm mb-6">สนาม Bouncy Badminton (09:00 - 11:00)</p>
                    <div class="bg-slate-800 rounded-2xl p-4 text-center">
                        <p class="text-xs text-slate-400">สมาชิกในกลุ่ม</p>
                        <p class="text-xl font-bold">66 คน</p>
                    </div>
                </div>

                <div class="bg-white border border-gray-100 rounded-[24px] p-6 space-y-4 shadow-sm">
                    <p class="text-sm text-gray-500 leading-relaxed text-center italic">
                        "ระบบจะบันทึกชื่อ LINE ของคุณลงในตาราง<br>และคำนวณจำนวนสนามให้อัตโนมัติ"
                    </p>
                    <button id="btn-confirm" onclick="confirmBooking()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ลงชื่อเล่นรอบนี้</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-50 flex justify-around py-3 pb-8">
            <button onclick="goToPage('home')" class="flex flex-col items-center gap-1 text-blue-600">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] font-bold">หน้าหลัก</span>
            </button>
            <button onclick="goToPage('home')" class="flex flex-col items-center gap-1 text-gray-300">
                <span class="text-xl">📅</span>
                <span class="text-[10px] font-bold">ลงชื่อ</span>
            </button>
        </nav>
    </div>

    <script>
        const liffId = "2009890406-XhexEJs4";
        const scriptURL = "https://script.google.com/macros/s/AKfycbwiK8N55ZkQo6Nzuh8NwFlUlxhm1RXApVXNvf-Yt5RG17GtWqmX6vXhkFX1RFViZec7/exec";
        
        let userName = "";
        let selectedDay = "";

        async function initLiff() {
            try {
                await liff.init({ liffId: liffId });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userName = profile.displayName;
                    document.getElementById('user-img').src = profile.pictureUrl;
                } else {
                    liff.login();
                }
            } catch (err) { console.error(err); }
        }

        function selectDate(day) {
            selectedDay = day;
            document.getElementById('selected-day-label').innerText = day;
            goToPage('booking');
        }

        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            window.scrollTo(0,0);
        }

        async function confirmBooking() {
            const btn = document.getElementById('btn-confirm');
            btn.innerText = "กำลังบันทึก...";
            btn.classList.add('loading');

            const payload = {
                name: userName,
                day: selectedDay
            };

            try {
                // ส่งข้อมูลไปที่ Google Sheets (โหมด no-cors เพื่อเลี่ยงปัญหาสิทธิ์บน Browser)
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                alert("ลงชื่อเล่นสำเร็จแล้ว! ตรวจสอบรายชื่อได้ที่ Google Sheets");
                goToPage('home');
            } catch (error) {
                console.error('Error!', error.message);
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
            } finally {
                btn.innerText = "ลงชื่อเล่นรอบนี้";
                btn.classList.remove('loading');
            }
        }

        initLiff();
    </script>
</body>
</html>
