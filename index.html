<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .btn-disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        .news-banner { background: linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%); border: 1px solid #fde68a; }
    </style>
</head>
<body class="bg-slate-50 flex justify-center text-slate-800">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl pb-32">
        
        <div class="absolute top-4 right-4 z-50 flex gap-1 bg-white/50 backdrop-blur-sm p-1 rounded-full border border-slate-200 text-[10px] font-bold">
            <button onclick="setLang('th')" id="lang-th" class="px-3 py-1 rounded-full">TH</button>
            <button onclick="setLang('en')" id="lang-en" class="px-3 py-1 rounded-full">EN</button>
            <button onclick="setLang('cn')" id="lang-cn" class="px-3 py-1 rounded-full">CN</button>
        </div>

        <div id="home-page" class="page active">
            <header class="pt-10 pb-6 text-center">
                <img id="user-img" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full border-4 border-white shadow-xl mx-auto object-cover mb-4">
                <h1 class="text-2xl font-bold tracking-tight">Bouncy Badminton</h1>
                <p id="txt-welcome" class="text-slate-400 text-xs mt-1 font-light uppercase tracking-widest"></p>
            </header>

            <div id="news-section" class="px-8 mb-6 hidden">
                <div class="news-banner rounded-[24px] p-4 flex gap-3 items-start shadow-sm">
                    <span class="text-xl">📢</span>
                    <div>
                        <p id="txt-news-title" class="text-[10px] font-black text-amber-600 uppercase tracking-widest mb-1">Update</p>
                        <p id="news-content" class="text-xs text-amber-900 leading-relaxed font-medium">--</p>
                    </div>
                </div>
            </div>
            
            <div class="px-8 space-y-4">
                <p id="txt-select-day" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1"></p>
                <div onclick="selectDate('วันอังคาร')" class="bg-white border border-slate-100 rounded-[30px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div>
                        <p class="font-bold text-lg" id="label-tuesday">--</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center italic font-bold">→</div>
                </div>
                <div onclick="selectDate('วันพฤหัสบดี')" class="bg-white border border-slate-100 rounded-[30px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div>
                        <p class="font-bold text-lg" id="label-thursday">--</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center italic font-bold">→</div>
                </div>
            </div>
        </div>

        <div id="booking-page" class="page">
            <nav class="p-6 flex items-center gap-4 sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-slate-50">
                <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-xl">←</button>
                <h1 id="txt-nav-title" class="text-lg font-bold"></h1>
            </nav>
            <div class="p-6 space-y-6">
                <div class="bg-slate-900 text-white rounded-[35px] p-8 shadow-2xl">
                    <h2 id="selected-day-label" class="text-2xl font-bold mb-6 tracking-tight">-</h2>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-white/10 rounded-2xl p-4 border border-white/5">
                            <p id="txt-stat-member" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest mb-1"></p>
                            <p id="member-count" class="text-2xl font-bold">0</p>
                        </div>
                        <div class="bg-white/10 rounded-2xl p-4 border border-white/5">
                            <p id="txt-stat-court" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest mb-1"></p>
                            <p id="court-count" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white border border-slate-100 rounded-[30px] p-6 min-h-[250px]">
                    <div id="member-list" class="space-y-1 max-h-[350px] overflow-y-auto pr-1">
                        <div class="text-center text-slate-300 py-10 text-sm">Loading...</div>
                    </div>
                </div>
                <div class="fixed bottom-8 left-0 w-full px-8 max-w-md mx-auto">
                    <button id="btn-action" onclick="confirmAction()" class="w-full py-4.5 rounded-[22px] font-bold shadow-2xl flex items-center justify-center gap-2 text-white">...</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ------------------------- สลับ URL ตรงนี้ -------------------------
        const scriptURL = "https://script.google.com/macros/s/AKfycbxY9MK7TZ7pjlMw_kctfxN3Oj2pZ2PFviaM5riWZSw8tORqnOgZ01ZcNoj8x9Bu6PC7/exec";
        const liffId = "2009890406-XhexEJs4";
        // -----------------------------------------------------------------
        
        let userName = "";
        let selectedDay = "";
        let isBooked = false;
        let currentLang = 'th';
        let currentTotalCount = 0;
        const LIMIT = 20;

        const i18n = {
            th: { welcome: "ยินดีต้อนรับสมาชิกทุกท่าน 🏸", selectDay: "กรุณาเลือกวันเข้าเล่น", navTitle: "รายชื่อนักกีฬา", statMember: "สมาชิก", statCourt: "สนาม", noMember: "ยังไม่มีคนลงชื่อ", join: "ลงชื่อเข้าเล่นรอบนี้ 🏸", leave: "ถอนรายชื่อออก ❌", processing: "กำลังประมวลผล...", news: "ประกาศ" },
            en: { welcome: "Welcome Members 🏸", selectDay: "Select a session", navTitle: "Player List", statMember: "Members", statCourt: "Courts", noMember: "No players yet", join: "Join Game 🏸", leave: "Leave ❌", processing: "Processing...", news: "News" },
            cn: { welcome: "欢迎会员 🏸", selectDay: "请选择日期", navTitle: "选手名单", statMember: "人数", statCourt: "场地", noMember: "暂无报名", join: "报名 🏸", leave: "取消 ❌", processing: "处理中...", news: "公告" }
        };

        function setLang(lang) {
            currentLang = lang;
            ['th', 'en', 'cn'].forEach(l => {
                document.getElementById(`lang-${l}`).className = l === lang ? "px-3 py-1 rounded-full bg-slate-800 text-white" : "px-3 py-1 rounded-full text-slate-400";
            });
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-select-day').innerText = t.selectDay;
            document.getElementById('txt-nav-title').innerText = t.navTitle;
            document.getElementById('txt-stat-member').innerText = t.statMember;
            document.getElementById('txt-stat-court').innerText = t.statCourt;
            document.getElementById('txt-news-title').innerText = t.news;
            document.getElementById('label-tuesday').innerText = getNextDayDisplay('วันอังคาร');
            document.getElementById('label-thursday').innerText = getNextDayDisplay('วันพฤหัสบดี');
            if(selectedDay) {
                document.getElementById('selected-day-label').innerText = getNextDayDisplay(selectedDay);
                updateActionButton();
            }
        }

        function getNextDayDisplay(dayName) {
            const daysMap = { "วันอาทิตย์": 0, "วันจันทร์": 1, "วันอังคาร": 2, "วันพุธ": 3, "วันพฤหัสบดี": 4, "วันศุกร์": 5, "วันเสาร์": 6 };
            const daysEN = { "วันอังคาร": "Tuesday", "วันพฤหัสบดี": "Thursday" };
            const daysCN = { "วันอังคาร": "周二", "วันพฤหัสบดี": "周四" };
            const now = new Date();
            let dist = (daysMap[dayName] - now.getDay() + 7) % 7;
            if (dist === 0 && now.getHours() >= 11) dist = 7;
            const targetDate = new Date();
            targetDate.setDate(now.getDate() + dist);
            const localeMap = { th: 'th-TH', en: 'en-US', cn: 'zh-CN' };
            const formatted = targetDate.toLocaleDateString(localeMap[currentLang], { day: 'numeric', month: 'long' });
            if (currentLang === 'th') return `${dayName}ที่ ${formatted}`;
            if (currentLang === 'en') return `${daysEN[dayName]}, ${formatted}`;
            return `${daysCN[dayName]} (${formatted})`;
        }

        async function initLiff() {
            await liff.init({ liffId: liffId });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userName = profile.displayName;
                if (profile.pictureUrl) document.getElementById('user-img').src = profile.pictureUrl;
                setLang('th');
                fetchAnnouncements();
            } else { liff.login(); }
        }

        async function fetchAnnouncements() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                if(data.announcement) {
                    document.getElementById('news-content').innerText = data.announcement;
                    document.getElementById('news-section').classList.remove('hidden');
                }
            } catch(e) {}
        }

        async function fetchMembers(day) {
            const listDiv = document.getElementById('member-list');
            const t = i18n[currentLang];
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                const allForDay = data.members
                    .filter(item => item.day === day)
                    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                const mainList = allForDay.slice(0, LIMIT);
                const waitingList = allForDay.slice(LIMIT);
                
                currentTotalCount = allForDay.length;
                isBooked = allForDay.some(m => m.name === userName);
                
                let html = '';
                if (mainList.length > 0) {
                    html += mainList.map((item, index) => `
                        <div class="flex justify-between items-center py-3.5 border-b border-slate-50 px-2">
                            <span class="text-sm ${item.name === userName ? 'font-bold text-blue-600' : 'text-slate-700'}">${index + 1}. ${item.name}</span>
                            ${item.name === userName ? '<span class="text-[8px] bg-blue-100 text-blue-500 px-2 py-1 rounded font-black">ACTIVE</span>' : ''}
                        </div>`).join('');
                }

                if (waitingList.length > 0) {
                    html += `<div class="mt-6 mb-2 text-[10px] font-bold text-rose-400 uppercase tracking-widest ml-2">Waiting List ⏳</div>`;
                    html += waitingList.map((item, index) => `
                        <div class="flex justify-between items-center py-3.5 border-b border-slate-50 px-2 bg-rose-50/30 rounded-xl mb-1">
                            <span class="text-sm text-slate-400">${index + 1 + LIMIT}. ${item.name}</span>
                            ${item.name === userName ? '<span class="text-[8px] bg-rose-100 text-rose-500 px-2 py-1 rounded font-black">WAITING</span>' : ''}
                        </div>`).join('');
                }

                if (allForDay.length === 0) {
                    html = `<div class="text-center text-slate-300 py-12 text-xs">${t.noMember}</div>`;
                }
                
                listDiv.innerHTML = html;
                document.getElementById('member-count').innerText = allForDay.length;
                document.getElementById('court-count').innerText = Math.ceil(mainList.length / 4);
                updateActionButton();
            } catch (e) { listDiv.innerHTML = "Error..."; }
        }

        function updateActionButton() {
            const btn = document.getElementById('btn-action');
            const t = i18n[currentLang];
            btn.classList.remove('btn-disabled');

            if (isBooked) {
                btn.innerHTML = t.leave;
                btn.className = "w-full py-4.5 rounded-[22px] font-bold shadow-2xl bg-rose-500 text-white flex items-center justify-center gap-2 active:scale-95 transition-all";
            } else {
                if (currentTotalCount >= LIMIT) {
                    btn.innerHTML = currentLang === 'th' ? "ลงชื่อ Waiting List ⏳" : (currentLang === 'en' ? "Join Waiting List ⏳" : "排队等候 ⏳");
                    btn.className = "w-full py-4.5 rounded-[22px] font-bold shadow-2xl bg-amber-500 text-white flex items-center justify-center gap-2 active:scale-95 transition-all";
                } else {
                    btn.innerHTML = t.join;
                    btn.className = "w-full py-4.5 rounded-[22px] font-bold shadow-2xl bg-blue-600 text-white flex items-center justify-center gap-2 active:scale-95 transition-all";
                }
            }
        }

        async function confirmAction() {
            const btn = document.getElementById('btn-action');
            const t = i18n[currentLang];
            const action = isBooked ? 'remove' : 'add';
            btn.classList.add('btn-disabled');
            btn.innerText = t.processing;
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: userName, day: selectedDay, action: action }) });
            setTimeout(() => { fetchMembers(selectedDay); }, 1500);
        }

        function selectDate(dayName) {
            selectedDay = dayName;
            updateUI();
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('booking-page').classList.add('active');
            fetchMembers(dayName);
        }

        initLiff();
    </script>
</body>
</html>
