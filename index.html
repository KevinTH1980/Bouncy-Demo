<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .btn-disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body class="bg-slate-50 flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl pb-32">
        
        <div class="absolute top-4 right-4 z-50 flex gap-1 bg-white/50 backdrop-blur-sm p-1 rounded-full border border-slate-200 shadow-sm text-[10px] font-bold">
            <button onclick="setLang('th')" id="lang-th" class="px-3 py-1 rounded-full transition-all">TH</button>
            <button onclick="setLang('en')" id="lang-en" class="px-3 py-1 rounded-full transition-all">EN</button>
            <button onclick="setLang('cn')" id="lang-cn" class="px-3 py-1 rounded-full transition-all">CN</button>
        </div>

        <div id="home-page" class="page active">
            <header class="p-10 text-center">
                <img id="user-img" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full border-4 border-white shadow-xl mx-auto object-cover mb-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Bouncy Badminton</h1>
                <p id="txt-welcome" class="text-slate-400 text-xs mt-1 font-light uppercase tracking-widest"></p>
            </header>
            
            <div class="px-8 space-y-5">
                <p id="txt-select-day" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1"></p>
                
                <div onclick="selectDate('วันอังคาร')" class="bg-white border border-slate-100 rounded-[30px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all hover:border-blue-200">
                    <div>
                        <p class="font-bold text-lg text-slate-800" id="label-tuesday">--</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center shadow-inner">→</div>
                </div>

                <div onclick="selectDate('วันพฤหัสบดี')" class="bg-white border border-slate-100 rounded-[30px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all hover:border-blue-200">
                    <div>
                        <p class="font-bold text-lg text-slate-800" id="label-thursday">--</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center shadow-inner">→</div>
                </div>
            </div>
        </div>

        <div id="booking-page" class="page">
            <nav class="p-6 flex items-center gap-4 sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-slate-50">
                <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full active:scale-90 transition-transform text-xl">←</button>
                <h1 id="txt-nav-title" class="text-lg font-bold text-slate-800"></h1>
            </nav>
            
            <div class="p-6 space-y-6">
                <div class="bg-slate-900 text-white rounded-[35px] p-8 shadow-2xl relative overflow-hidden">
                    <h2 id="selected-day-label" class="text-2xl font-bold mb-6 tracking-tight">-</h2>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-white/10 rounded-2xl p-4 border border-white/5">
                            <p id="txt-stat-member" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest mb-1"></p>
                            <p id="member-count" class="text-2xl font-bold">0</p>
                        </div>
                        <div class="bg-white/10 rounded-2xl p-4 border border-white/5">
                            <p id="txt-stat-court" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest mb-1"></p>
                            <p id="court-count" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white border border-slate-100 rounded-[30px] p-6 shadow-sm min-h-[300px]">
                    <div id="member-list" class="space-y-1 max-h-[350px] overflow-y-auto pr-1">
                        <div class="text-center text-slate-300 py-10 text-sm">Loading...</div>
                    </div>
                </div>

                <div class="fixed bottom-8 left-0 w-full px-8 max-w-md mx-auto">
                    <button id="btn-action" onclick="confirmAction()" class="w-full py-4.5 rounded-[22px] font-bold shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-2 text-white">
                        ...
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxEZ0l6dFWEuOagfEwyXXRE6U45Pps09W3KpIQfly4qAi9gFCbxb1zHVDb0V-GpLyLg/exec";
        const liffId = "2009890406-XhexEJs4";
        
        let userName = "";
        let selectedDay = "";
        let isBooked = false;
        let currentLang = 'th';

        const i18n = {
            th: {
                welcome: "ยินดีต้อนรับสมาชิกทุกท่าน 🏸",
                selectDay: "กรุณาเลือกวันเข้าเล่น",
                navTitle: "รายชื่อนักกีฬา",
                statMember: "สมาชิก",
                statCourt: "สนามที่ใช้",
                noMember: "ยังไม่มีคนลงชื่อ",
                join: "ลงชื่อเข้าเล่นรอบนี้ 🏸",
                leave: "ถอนรายชื่อออก ❌",
                alertJoin: "ลงชื่อสำเร็จ! เตรียมตัวให้พร้อมนะครับ",
                alertLeave: "ถอนรายชื่อเรียบร้อยแล้ว",
                processing: "กำลังประมวลผล..."
            },
            en: {
                welcome: "Welcome to our community 🏸",
                selectDay: "Please select a session",
                navTitle: "Player List",
                statMember: "Members",
                statCourt: "Courts",
                noMember: "No participants yet",
                join: "Join this session 🏸",
                leave: "Leave session ❌",
                alertJoin: "Join successful! See you on court.",
                alertLeave: "Successfully removed.",
                processing: "Processing..."
            },
            cn: {
                welcome: "欢迎来到羽毛球社区 🏸",
                selectDay: "请选择活动日期",
                navTitle: "选手名单",
                statMember: "人数",
                statCourt: "场地数",
                noMember: "暂无报名人数",
                join: "报名参加 🏸",
                leave: "取消报名 ❌",
                alertJoin: "报名成功！球场见。",
                alertLeave: "已取消报名。",
                processing: "正在处理..."
            }
        };

        function setLang(lang) {
            currentLang = lang;
            // Update Buttons UI
            ['th', 'en', 'cn'].forEach(l => {
                const btn = document.getElementById(`lang-${l}`);
                btn.className = l === lang ? "px-3 py-1 rounded-full bg-slate-800 text-white" : "px-3 py-1 rounded-full text-slate-400";
            });
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-select-day').innerText = t.selectDay;
            document.getElementById('txt-nav-title').innerText = t.navTitle;
            document.getElementById('txt-stat-member').innerText = t.statMember;
            document.getElementById('txt-stat-court').innerText = t.statCourt;
            
            document.getElementById('label-tuesday').innerText = getNextDayDisplay('วันอังคาร');
            document.getElementById('label-thursday').innerText = getNextDayDisplay('วันพฤหัสบดี');
            
            if(selectedDay) {
                document.getElementById('selected-day-label').innerText = getNextDayDisplay(selectedDay);
                updateActionButton();
            }
        }

        function getNextDayDisplay(dayName) {
            const daysMap = { "วันอาทิตย์": 0, "วันจันทร์": 1, "วันอังคาร": 2, "วันพุธ": 3, "วันพฤหัสบดี": 4, "วันศุกร์": 5, "วันเสาร์": 6 };
            const daysEN = { "วันอังคาร": "Tuesday", "วันพฤหัสบดี": "Thursday" };
            const daysCN = { "วันอังคาร": "周二", "วันพฤหัสบดี": "周四" };

            const now = new Date();
            let distance = (daysMap[dayName] - now.getDay() + 7) % 7;
            if (distance === 0 && now.getHours() >= 11) distance = 7;
            
            const targetDate = new Date();
            targetDate.setDate(now.getDate() + distance);

            const localeMap = { th: 'th-TH', en: 'en-US', cn: 'zh-CN' };
            const formattedDate = targetDate.toLocaleDateString(localeMap[currentLang], { day: 'numeric', month: 'long' });
            
            if (currentLang === 'th') return `${dayName}ที่ ${formattedDate}`;
            if (currentLang === 'en') return `${daysEN[dayName]}, ${formattedDate}`;
            return `${daysCN[dayName]} (${formattedDate})`;
        }

        async function initLiff() {
            await liff.init({ liffId: liffId });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userName = profile.displayName;
                if (profile.pictureUrl) document.getElementById('user-img').src = profile.pictureUrl;
                setLang('th');
            } else { liff.login(); }
        }

        function selectDate(dayName) {
            selectedDay = dayName;
            updateUI();
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('booking-page').classList.add('active');
            fetchMembers(dayName);
        }

        async function fetchMembers(day) {
            const listDiv = document.getElementById('member-list');
            const t = i18n[currentLang];
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                const filtered = data.filter(item => item.day === day);
                isBooked = filtered.some(m => m.name === userName);
                
                if (filtered.length === 0) {
                    listDiv.innerHTML = `<div class="text-center text-slate-300 py-12 text-xs italic">${t.noMember}</div>`;
                } else {
                    listDiv.innerHTML = filtered.map((item, index) => `
                        <div class="flex justify-between items-center py-3.5 border-b border-slate-50 px-2">
                            <span class="text-sm ${item.name === userName ? 'font-bold text-blue-600' : 'text-slate-700'}">${index + 1}. ${item.name}</span>
                            ${item.name === userName ? '<span class="text-[8px] bg-blue-100 text-blue-500 px-2 py-1 rounded-lg font-black">ME</span>' : ''}
                        </div>`).join('');
                }
                document.getElementById('member-count').innerText = filtered.length;
                document.getElementById('court-count').innerText = Math.ceil(filtered.length / 4);
                updateActionButton();
            } catch (e) { listDiv.innerHTML = "Error..."; }
        }

        function updateActionButton() {
            const btn = document.getElementById('btn-action');
            const t = i18n[currentLang];
            btn.classList.remove('btn-disabled');
            if (isBooked) {
                btn.innerHTML = t.leave;
                btn.className = "w-full py-4.5 rounded-[22px] font-bold shadow-2xl bg-rose-500 text-white flex items-center justify-center gap-2 active:scale-95 transition-all";
            } else {
                btn.innerHTML = t.join;
                btn.className = "w-full py-4.5 rounded-[22px] font-bold shadow-2xl bg-blue-600 text-white flex items-center justify-center gap-2 active:scale-95 transition-all";
            }
        }

        async function confirmAction() {
            const btn = document.getElementById('btn-action');
            const t = i18n[currentLang];
            const action = isBooked ? 'remove' : 'add';
            btn.classList.add('btn-disabled');
            btn.innerText = t.processing;

            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: userName, day: selectedDay, action: action })
            });

            setTimeout(() => { 
                fetchMembers(selectedDay); 
                alert(action === 'add' ? t.alertJoin : t.alertLeave);
            }, 1500);
        }

        initLiff();
    </script>
</body>
</html>
