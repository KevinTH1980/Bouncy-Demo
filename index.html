<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-lg pb-28">
        
        <div id="home-page" class="page active">
            <header class="p-6 text-center">
                <img id="user-img" src="https://via.placeholder.com/150" class="w-16 h-16 rounded-full border-4 border-white shadow-md mx-auto mb-3">
                <h1 class="text-xl font-bold text-slate-800">Bouncy Badminton 🏸</h1>
                <p class="text-gray-400 text-xs">เลือกวันที่คุณต้องการเข้าเล่น</p>
            </header>
            
            <div class="px-6 space-y-4">
                <div onclick="selectDate('วันอังคาร')" class="bg-white border border-gray-100 rounded-[24px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div>
                        <p class="font-bold text-lg text-slate-800">วันอังคาร</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="text-blue-600 font-bold">➡️</div>
                </div>

                <div onclick="selectDate('วันพฤหัสบดี')" class="bg-white border border-gray-100 rounded-[24px] p-6 shadow-sm flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                    <div>
                        <p class="font-bold text-lg text-slate-800">วันพฤหัสบดี</p>
                        <p class="text-blue-500 text-sm font-semibold">09:00 - 11:00</p>
                    </div>
                    <div class="text-blue-600 font-bold">➡️</div>
                </div>
            </div>
        </div>

        <div id="booking-page" class="page">
            <nav class="p-6 flex items-center gap-4 border-b">
                <button onclick="goToPage('home')" class="text-2xl">←</button>
                <h1 class="text-xl font-bold">รายชื่อสมาชิก</h1>
            </nav>
            
            <div class="p-6 space-y-6">
                <div class="bg-slate-900 text-white rounded-[30px] p-6 shadow-xl">
                    <h2 id="selected-day-label" class="text-2xl font-bold mb-4">-</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                            <p class="text-[10px] text-slate-400 uppercase">ลงชื่อแล้ว</p>
                            <p id="member-count" class="text-xl font-bold">0 คน</p>
                        </div>
                        <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                            <p class="text-[10px] text-slate-400 uppercase">จำนวนสนาม</p>
                            <p id="court-count" class="text-xl font-bold">0 คอร์ท</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white border border-gray-100 rounded-[24px] p-5 shadow-sm">
                    <div id="member-list" class="space-y-2 max-h-80 overflow-y-auto">
                        <div class="loading-pulse text-center text-gray-400 text-sm py-4">กำลังโหลดรายชื่อ...</div>
                    </div>
                </div>

                <div class="fixed bottom-6 left-0 w-full px-6 max-w-md mx-auto">
                    <button id="btn-confirm" onclick="confirmAction()" class="w-full py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        โหลดข้อมูล...
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const liffId = "2009890406-XhexEJs4";
        const scriptURL = "https://script.google.com/macros/s/AKfycbwgKTmwqpd_Is5JJy8ajWJlCQ4poCckBEMFcletyRh1HGpifjUPPlDrNGFzr824S90U/exec";
        
        let userName = "";
        let selectedDay = "";
        let isAlreadyBooked = false;

        async function initLiff() {
            try {
                await liff.init({ liffId: liffId });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userName = profile.displayName;
                    document.getElementById('user-img').src = profile.pictureUrl;
                } else {
                    liff.login();
                }
            } catch (err) { console.error(err); }
        }

        async function fetchMembers(day) {
            const listContainer = document.getElementById('member-list');
            const btn = document.getElementById('btn-confirm');
            
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                const filtered = data.filter(item => item.day === day);
                
                // เช็คว่าเราลงชื่อหรือยัง
                isAlreadyBooked = filtered.some(m => m.name === userName);
                
                // ปรับสถานะปุ่ม
                if (isAlreadyBooked) {
                    btn.innerText = "ถอนรายชื่อออก ❌";
                    btn.className = "w-full py-4 rounded-2xl font-bold shadow-lg bg-red-500 text-white active:scale-95 transition-all flex items-center justify-center gap-2";
                } else {
                    btn.innerText = "ลงชื่อเข้าเล่นรอบนี้ 🏸";
                    btn.className = "w-full py-4 rounded-2xl font-bold shadow-lg bg-blue-600 text-white active:scale-95 transition-all flex items-center justify-center gap-2";
                }

                if (filtered.length === 0) {
                    listContainer.innerHTML = `<p class="text-center text-gray-400 text-sm py-4">ยังไม่มีคนลงชื่อ</p>`;
                } else {
                    listContainer.innerHTML = filtered.map((item, index) => `
                        <div class="flex justify-between items-center py-3 border-b border-gray-50 last:border-0">
                            <span class="text-sm ${item.name === userName ? 'font-bold text-blue-600' : 'text-slate-700'}">${index + 1}. ${item.name}</span>
                            ${item.name === userName ? '<span class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold uppercase">Me</span>' : ''}
                        </div>
                    `).join('');
                }
                
                document.getElementById('member-count').innerText = filtered.length + " คน";
                document.getElementById('court-count').innerText = Math.ceil(filtered.length / 4) + " คอร์ท";

            } catch (error) {
                listContainer.innerHTML = `<p class="text-center text-red-400 text-sm py-4">โหลดข้อมูลไม่สำเร็จ</p>`;
            }
        }

        function selectDate(day) {
            selectedDay = day;
            document.getElementById('selected-day-label').innerText = day;
            goToPage('booking');
            fetchMembers(day);
        }

        async function confirmAction() {
            const btn = document.getElementById('btn-confirm');
            const action = isAlreadyBooked ? 'remove' : 'add';
            
            btn.disabled = true;
            btn.innerText = "กำลังดำเนินการ...";

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        name: userName,
                        day: selectedDay,
                        action: action
                    })
                });

                // จำลองการโหลดใหม่หลังบันทึก (เนื่องจากโหมด no-cors ไม่ส่งผลตอบกลับ)
                setTimeout(() => {
                    fetchMembers(selectedDay);
                }, 1000);

            } catch (error) {
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
            }
        }

        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            window.scrollTo(0,0);
        }

        initLiff();
    </script>
</body>
</html>
