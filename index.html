<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncy Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6 min-h-[500px]">
        <div id="home">
            <h1 class="text-2xl font-bold mb-4 text-center border-b pb-4">Bouncy Badminton 🏸</h1>
            <button onclick="selectDay('วันอังคาร')" class="w-full bg-blue-500 text-white p-6 rounded-2xl mb-4 font-bold">วันอังคาร (09:00 - 11:00)</button>
            <button onclick="selectDay('วันพฤหัสบดี')" class="w-full bg-blue-500 text-white p-6 rounded-2xl font-bold">วันพฤหัสบดี (09:00 - 11:00)</button>
        </div>

        <div id="booking" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-500">← กลับหน้าหลัก</button>
            <h2 id="day-title" class="text-xl font-bold mb-4 text-blue-600"></h2>
            <div id="list" class="bg-gray-50 p-4 rounded-xl mb-6 min-h-[100px] text-sm space-y-2">กำลังโหลดรายชื่อ...</div>
            <button id="btn-action" onclick="handleAction()" class="w-full py-4 rounded-xl font-bold text-white shadow-lg">กำลังโหลด...</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzQ3JaC1ET5bnaHknS0-nKTjdeQGb0jj1qXuJYfw4AEV03sNUVr1LZ-5n5MCYhRxj64/exec";
        let userName = "";
        let currentDay = "";
        let isBooked = false;

        async function init() {
            await liff.init({ liffId: "2009890406-XhexEJs4" });
            if (!liff.isLoggedIn()) liff.login();
            const profile = await liff.getProfile();
            userName = profile.displayName;
        }

        async function selectDay(day) {
            currentDay = day;
            document.getElementById('home').classList.add('hidden');
            document.getElementById('booking').classList.remove('hidden');
            document.getElementById('day-title').innerText = day;
            loadData();
        }

        async function loadData() {
            const listDiv = document.getElementById('list');
            const btn = document.getElementById('btn-action');
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const filtered = data.filter(d => d.day === currentDay);
                isBooked = filtered.some(d => d.name === userName);

                listDiv.innerHTML = filtered.length ? filtered.map((d, i) => `<div>${i+1}. ${d.name}</div>`).join('') : "ยังไม่มีคนลงชื่อ";
                btn.innerText = isBooked ? "ถอนรายชื่อ ❌" : "ลงชื่อเข้าเล่น 🏸";
                btn.className = isBooked ? "w-full py-4 rounded-xl font-bold text-white bg-red-500" : "w-full py-4 rounded-xl font-bold text-white bg-green-500";
            } catch (e) { listDiv.innerHTML = "โหลดข้อมูลไม่สำเร็จ"; }
        }

        async function handleAction() {
            const btn = document.getElementById('btn-action');
            btn.disabled = true;
            btn.innerText = "กำลังประมวลผล...";
            const action = isBooked ? 'remove' : 'add';
            
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: userName, day: currentDay, action: action })
            });

            setTimeout(loadData, 1500);
        }

        init();
    </script>
</body>
</html>
